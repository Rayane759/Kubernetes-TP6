apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: hugosmn5/backend-3-tier:1.1
        ports:
        - containerPort: 5000
        env:
        - name: DB_USER
          value: "admin"
        - name: DB_PASS
          value: "password"
        - name: DB
          value: "reviews"
        - name: DB_HOST
          value: "postgresql"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
  - port: 5000
    targetPort: 5000